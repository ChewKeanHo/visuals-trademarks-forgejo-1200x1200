</style><style
     type="text/css"
     id="global">
	:root {
		max-width: 100%;
		max-height: 100%;

		--path-width: 25;
		--path-circle-width: 15;
		--path-length-light: 200;
		--path-length-dark: 130;
	}

	#path-light,
	#path-dark {
		stroke-dashoffset: 0;
		stroke-width: var(--path-width);
	}

	#circle-start,
	#circle-end-dark,
	#circle-end-light {
		stroke-width: var(--path-circle-width);
	}

	#path-dark {
		stroke-dasharray: var(--path-length-dark);
		animation: draw-path-dark 2000ms ease-out 5ms infinite;
	}

	#circle-end-dark {
		animation: draw-circle-dark 2000ms ease-out 5ms infinite;
	}

	#path-light {
		stroke-dasharray: var(--path-length-light);
		animation: draw-path-light 2000ms ease-out 5ms infinite;
	}

	#circle-end-light {
		animation: draw-circle-light 2000ms ease-out 5ms infinite;
	}

	#foreground-animated {
		opacity: 1;
		animation: reset-fade-out 2000ms ease-in-out 5ms infinite;
	}

	@keyframes reset-fade-out {
		0%, 25%, 100% { opacity: 1; }
		5%, 6% { opacity: 0; }
		24% { opacity: .5; }
	}

	@keyframes draw-path-dark {
		0%, 100% { stroke-dashoffset: 0; stroke-width: var(--path-width); }
		15%, 25% { stroke-dashoffset: var(--path-length-dark); stroke-width: 0; }
		55% { stroke-dashoffset: 0; stroke-width: var(--path-width); }
	}

	@keyframes draw-circle-dark {
		0%, 100% { stroke-width: var(--path-circle-width); }
		13%, 50% { stroke-width: 0; }
		53% { stroke-width: var(--path-circle-width); }
	}

	@keyframes draw-path-light {
		0%, 100% { stroke-dashoffset: 0; stroke-width: var(--path-width); }
		15%, 45%, 55% { stroke-dashoffset: var(--path-length-light); stroke-width: 0; }
		75% { stroke-dashoffset: 0; stroke-width: var(--path-width); }
	}

	@keyframes draw-circle-light {
		0%, 100% { stroke-width: var(--path-circle-width); }
		13%, 70% { stroke-width: 0; }
		73% { stroke-width: var(--path-circle-width); }
	}
</style><metadata
